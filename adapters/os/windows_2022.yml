---
adapter_id: os_windows_2022
channel: os
priority: 50
version: "1.0.0"

match:
  os_type: windows
  version_patterns: ["2022", "10\\.0\\.20348"]

capabilities:
  sections_supported:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

collect:
  tasks_dir: "os-gather/tasks/windows"
  gather_tasks:
    - "os-gather/tasks/windows/gather_system.yml"
    - "os-gather/tasks/windows/gather_cpu.yml"
    - "os-gather/tasks/windows/gather_memory.yml"
    - "os-gather/tasks/windows/gather_storage.yml"
    - "os-gather/tasks/windows/gather_network.yml"
    - "os-gather/tasks/windows/gather_users.yml"

credentials:
  profile: "os_windows"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system]
  optional_sections: [users]
