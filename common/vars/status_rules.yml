---
# ==============================================================================
# status_rules.yml — 수집 상태 판정 규칙 (참고 문서)
# ==============================================================================
# ⚠⚠⚠  DEAD CODE — 현재 어떤 playbook/task에서도 로드하지 않음  ⚠⚠⚠
#
# 이 파일은 향후 동적 정책 로딩 기능을 위해 예약(reserved)되어 있습니다.
# 삭제하지 마십시오.
#
# 현재 상태:
#   - 어떤 include_vars / vars_files 에서도 참조되지 않음
#   - build_status.yml 의 판정 로직은 인라인 Jinja2 로 구현되어 있음
#   - 이 파일은 운영자를 위한 정책 참고 문서로만 유지됨
#
# 활성화 방법:
#   향후 동적 정책 로딩이 필요하면 build_status.yml 에서 이 파일을
#   include_vars 로 로드하고, 인라인 판정 로직을 이 규칙으로 교체하세요.
# ==============================================================================
# 전체 수집 결과의 status(success/partial/failed)를 판정하는 규칙입니다.
#
# 사용처:
#   - build_status.yml: _out_status 결정 (현재 인라인 구현)
#   - adapter graceful_degradation 정책과 연동
#
# 운영자가 수정할 경우:
#   - 예: "firmware 실패는 partial로 보되, storage 실패는 failed로 보자"
#     → critical_determines_failure를 true로 설정하고 critical_sections 조정
# ==============================================================================

status_rules:
  # pre-check 단계에서 실패한 경우
  precheck_failed:
    overall_status: "failed"
    description: "사전 진단에서 실패 (네트워크, 포트, 프로토콜, 인증)"

  # adapter를 찾지 못한 경우
  no_adapter_matched:
    overall_status: "failed"
    description: "적합한 adapter를 찾지 못함"

  # 프로토콜 미지원 (예: Redfish 없는 구 세대)
  protocol_not_supported:
    overall_status: "failed"
    section_status_override: "not_supported"
    description: "수집 프로토콜을 지원하지 않는 장비"

  # 수집 결과 기반 판정
  collection_result:
    all_supported_sections_success:
      overall_status: "success"
      description: "지원하는 모든 섹션 수집 성공"

    some_supported_sections_failed:
      overall_status: "partial"
      description: "일부 섹션 성공, 일부 실패"

    all_supported_sections_failed:
      overall_status: "failed"
      description: "지원하는 모든 섹션 수집 실패"

# Graceful Degradation 기본 정책
# adapter별로 override 가능
default_degradation:
  on_section_fail: "continue"
  on_auth_fail: "abort"
  critical_determines_failure: false
