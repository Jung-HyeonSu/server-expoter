---
# ==============================================================================
# supported_sections.yml — 채널별 지원 섹션 정의
# ==============================================================================
# 각 채널(redfish/os/esxi)이 수집할 수 있는 섹션 목록을 정의합니다.
#
# 사용처:
#   - build_sections.yml: 섹션 상태(success/failed/not_supported) 판정
#   - build_failed_output.yml: 실패 시 _fail_sec_supported 자동 설정
#   - adapter YAML: capabilities.sections_supported 기본값
#
# 새 섹션 추가 시: all_sections에 추가하고, 해당 채널 목록에도 추가하세요.
# ==============================================================================

# 전체 섹션 목록 (순서 = output JSON 순서)
all_sections:
  - system
  - hardware
  - bmc
  - cpu
  - memory
  - storage
  - network
  - firmware
  - users
  - power

# 채널별 지원 섹션
channel_sections:
  redfish:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

  os:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

  esxi:
    - system
    - hardware
    - cpu
    - memory
    - storage
    - network
