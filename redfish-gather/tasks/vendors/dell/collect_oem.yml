---
# redfish-gather/tasks/vendors/dell/collect_oem.yml
#
# dell OEM 특화 수집 (표준 Redfish 에서 제공하지 않는 항목)
# 결과는 반드시 fragment 로만 생성하고 merge_fragment 를 호출한다.
#
# 현재: placeholder (OEM 수집 요구사항 발생 시 구현)
# 추가 방법: _data_fragment 에 OEM 데이터 추가 후 merge_fragment 호출

- name: "redfish | dell | collect_oem (placeholder)"
  ansible.builtin.set_fact:
    _data_fragment:               {}
    _sections_supported_fragment: []
    _sections_collected_fragment: []
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

