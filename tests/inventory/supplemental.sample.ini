# Supplemental test equipment — 추가 검증용 (샘플)
# baseline 장비와 분리 운영. baseline vault/inventory를 변경하지 않음.
#
# 사용법:
#   1. 이 파일을 local/supplemental.ini 로 복사
#   2. 실제 credential을 입력
#   3. ansible-playbook site.yml -i tests/inventory/local/supplemental.ini
#
# 주의: local/ 디렉토리는 gitignored — credential이 repo에 올라가지 않음

[cisco_supplemental]
# <CISCO_IP> ansible_user=<USER> ansible_password=<PASSWORD>

[dell_r760_supplemental]
# <DELL_R760_IP> ansible_user=<USER> ansible_password=<PASSWORD>
